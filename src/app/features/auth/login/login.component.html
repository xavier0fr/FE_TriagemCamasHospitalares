<div class="login-page">
  <div class="login-left">
    <div class="login-brand">
      <div class="brand-logo">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <span>MedTriage</span>
    </div>
    <div class="login-hero">
      <h1>Sistema de Triagem<br>de Camas Hospitalares</h1>
      <p>Gestão eficiente de camas, internamentos e recursos hospitalares numa única plataforma.</p>
      <div class="login-stats">
        <div class="login-stat">
          <span class="stat-num">24/7</span>
          <span class="stat-lbl">Disponível</span>
        </div>
        <div class="login-stat">
          <span class="stat-num">3</span>
          <span class="stat-lbl">Perfis de Acesso</span>
        </div>
        <div class="login-stat">
          <span class="stat-num">RT</span>
          <span class="stat-lbl">Tempo Real</span>
        </div>
      </div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-form-wrap">
      <div class="form-icon">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
        </svg>
      </div>
      <h2>Bem-vindo</h2>
      <p class="login-sub">Introduza as suas credenciais para aceder</p>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="form-group">
          <label for="email">Email institucional</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            required
            placeholder="utilizador@hospital.pt"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password_hash"
            name="password_hash"
            required
            placeholder="••••••••"
          />
        </div>

        @if (erro()) {
          <div class="form-error">{{ erro() }}</div>
        }

        <button type="submit" class="btn-submit" [disabled]="loading() || !loginForm.valid">
          {{ loading() ? 'A autenticar...' : 'Entrar no Sistema' }}
        </button>
      </form>
    </div>
  </div>
</div>
